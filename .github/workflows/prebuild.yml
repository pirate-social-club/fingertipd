name: Linux x64 prebuild

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to create or update
        default: v0.1.0
        required: true

permissions:
  contents: write

env:
  GO_VERSION: 1.24.6
  HNSD_VERSION: v2.0.0
  HNSD_COMMIT: a5c7c287e848f46d3e97f16b698e2027c8dc96c3

jobs:
  linux-x64:
    runs-on: ubuntu-24.04
    # A dated Debian image keeps the C toolchain stable and reviewable. Update
    # this pin deliberately alongside a successful compatibility run.
    container: debian:trixie-20250630-slim@sha256:88ef4df0f82963ff3c0472493da188f082822b2a16b1be23d238d124d5c8c92e
    steps:
      - name: Install build prerequisites
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            autoconf automake build-essential ca-certificates curl gh git \
            libevent-dev libexpat1-dev libssl-dev libtool libunbound-dev pkg-config
      - name: Install Go
        run: |
          curl --fail --location --silent --show-error \
            "https://go.dev/dl/go${GO_VERSION}.linux-amd64.tar.gz" -o /tmp/go.tar.gz
          echo "bbca37cc395c974ffa4893ee35819ad23ebb27426df87af92e93a9ec66ef8712  /tmp/go.tar.gz" | sha256sum -c -
          tar -C /usr/local -xzf /tmp/go.tar.gz
          echo /usr/local/go/bin >> "$GITHUB_PATH"
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Verify release source
        run: test "$(git rev-parse HEAD)" = "$(git rev-list -n 1 '${{ inputs.release_tag }}')"
      - name: Build fingertipd
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go test ./...
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -buildvcs=false -trimpath -ldflags='-s -w -buildid=' \
            -o dist/linux-x64/fingertipd .
      - name: Build pinned hnsd
        run: |
          git clone --filter=blob:none --no-checkout https://github.com/handshake-org/hnsd.git /tmp/hnsd
          git -C /tmp/hnsd checkout --detach "$HNSD_COMMIT"
          test "$(git -C /tmp/hnsd describe --tags --exact-match)" = "$HNSD_VERSION"
          cd /tmp/hnsd
          ./autogen.sh
          ./configure --disable-shared --enable-static
          make -j2
          cp hnsd "$GITHUB_WORKSPACE/dist/linux-x64/hnsd"
      - name: Build test-only regtest hnsd
        run: |
          git clone --no-hardlinks /tmp/hnsd /tmp/hnsd-regtest
          cd /tmp/hnsd-regtest
          git reset --hard "$HNSD_COMMIT"
          test "$(git rev-parse HEAD)" = "$HNSD_COMMIT"
          ./autogen.sh
          ./configure --disable-shared --enable-static --with-network=regtest
          make -j2
          mkdir -p "$GITHUB_WORKSPACE/dist/test-linux-x64"
          cp hnsd "$GITHUB_WORKSPACE/dist/test-linux-x64/hnsd-regtest"
      - name: Package and checksum
        run: |
          chmod 0755 dist/linux-x64/fingertipd dist/linux-x64/hnsd
          mkdir -p package/licenses
          cp dist/linux-x64/fingertipd dist/linux-x64/hnsd package/
          cp LICENSE package/licenses/fingertipd-MIT.txt
          cp /tmp/hnsd/LICENSE package/licenses/hnsd-MIT.txt
          cp "$(go env GOMODCACHE)/github.com/buffrr/letsdane@v0.6.1/LICENSE" \
            package/licenses/letsdane-Apache-2.0.txt
          cd package
          sha256sum fingertipd hnsd > "$GITHUB_WORKSPACE/SHA256SUMS"
          cd "$GITHUB_WORKSPACE"
          tar --sort=name --mtime='UTC 1970-01-01' --owner=0 --group=0 --numeric-owner \
            -C package -czf freedom-hns-linux-x64.tar.gz .
          sha256sum freedom-hns-linux-x64.tar.gz >> SHA256SUMS
      - name: Package test-only regtest binary
        run: |
          chmod 0755 dist/test-linux-x64/hnsd-regtest
          mkdir -p test-package
          cp dist/test-linux-x64/hnsd-regtest test-package/
          sha256sum dist/test-linux-x64/hnsd-regtest | sed 's#dist/test-linux-x64/##' \
            > TEST_SHA256SUMS
          tar --sort=name --mtime='UTC 1970-01-01' --owner=0 --group=0 --numeric-owner \
            -C test-package -czf hnsd-regtest-linux-x64.tar.gz .
          sha256sum hnsd-regtest-linux-x64.tar.gz >> TEST_SHA256SUMS
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: freedom-hns-${{ inputs.release_tag }}-linux-x64
          path: |
            freedom-hns-linux-x64.tar.gz
            SHA256SUMS
            hnsd-regtest-linux-x64.tar.gz
            TEST_SHA256SUMS
          if-no-files-found: error
      - name: Attach artifacts to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release view '${{ inputs.release_tag }}' >/dev/null 2>&1 || \
            gh release create '${{ inputs.release_tag }}' --verify-tag --title '${{ inputs.release_tag }}'
          gh release upload '${{ inputs.release_tag }}' \
            freedom-hns-linux-x64.tar.gz SHA256SUMS \
            hnsd-regtest-linux-x64.tar.gz TEST_SHA256SUMS --clobber
